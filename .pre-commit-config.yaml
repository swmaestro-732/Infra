# 최초 1회: pip install pre-commit && pre-commit install --hook-type commit-msg --hook-type pre-commit
repos:
  # 커밋 메시지 형식 검사: <type>: 내용  (type ∈ feat/docs/fix/chore/hotfix/release)
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, docs, fix, chore, hotfix, release]

  # Terraform 사전 검사 (커밋 전 fmt/lint)
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.108.0
    hooks:
      - id: terraform_fmt
      - id: terraform_tflint
        args:
          - --args=--recursive

  # 공통 위생
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
