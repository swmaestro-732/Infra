name: Terraform Apply

# main 머지 시 prod 환경에 적용. apply 전 Trivy(CRITICAL) 게이트 + Environment(prod) 수동 승인.
on:
  push:
    branches: [main]
    # 인프라(terraform) 변경 때만 apply. 워크플로우/문서 변경으로는 트리거하지 않음(불필요한 apply 방지).
    paths:
      - "terraform/**"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  TF_VERSION: "1.11.4"
  WORKING_DIR: terraform/environments/prod

jobs:
  # apply 전 보안 게이트: CRITICAL 이면 차단. main 기준 SARIF 도 업로드(Security 탭 베이스라인).
  security:
    name: trivy gate (CRITICAL)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan (SARIF, main baseline)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: terraform
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy-config

      - name: Gate on CRITICAL
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: terraform
          format: table
          severity: CRITICAL
          exit-code: "1"

  apply:
    name: apply (prod)
    needs: [security] # CRITICAL 미스컨피그면 apply 차단
    runs-on: ubuntu-latest
    environment: prod # Settings → Environments → prod 에서 승인자 지정 가능
    if: vars.AWS_ROLE_ARN != ''
    permissions:
      id-token: write # OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -input=false
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform apply
        id: apply
        working-directory: ${{ env.WORKING_DIR }}
        # pipefail 없으면 tee 가 종료코드를 삼켜서 apply 실패가 success 로 둔갑함
        run: |
          set -o pipefail
          terraform apply -auto-approve -input=false -no-color | tee apply.txt

      - name: Apply 결과 요약
        if: always()
        working-directory: ${{ env.WORKING_DIR }}
        env:
          OUTCOME: ${{ steps.apply.outcome }}
        run: |
          icon="❌"; [ "$OUTCOME" = "success" ] && icon="✅"
          # 리소스 변경 요약 한 줄 (added/changed/destroyed) 또는 에러
          result=$(grep -E "Apply complete!|No changes\.|Error:" apply.txt 2>/dev/null | tail -1 || true)
          {
            echo "## Terraform Apply (prod) $icon"
            echo ""
            echo "**결과:** ${result:-출력 없음}"
            echo ""
            echo "**커밋** \`${GITHUB_SHA:0:7}\` · **실행** @${GITHUB_ACTOR}"
            echo ""
            # 출력값(ALB DNS·RDS 엔드포인트 등)을 표로
            if [ "$OUTCOME" = "success" ] && terraform output -json > tfout.json 2>/dev/null && [ "$(jq 'length' tfout.json 2>/dev/null || echo 0)" -gt 0 ]; then
              echo "### 출력값"
              echo ""
              echo "| 키 | 값 |"
              echo "|---|---|"
              jq -r 'to_entries[] | "| `\(.key)` | `\(if .value.sensitive then "(민감값 숨김)" else (.value.value|tostring) end)` |"' tfout.json
              echo ""
            fi
            echo "<details><summary>전체 apply 로그</summary>"
            echo ""
            echo '```'
            cat apply.txt 2>/dev/null || echo "출력 없음"
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
