name: Terraform CI

# PR 검증: fmt/validate/lint · Trivy(IaC 보안) · plan+비용. 결과는 하나의 PR 코멘트로 통합.
on:
  # 모든 PR에 실행 → 필수 상태체크(fmt/validate/lint·trivy)가 항상 보고되도록 paths 필터 없음.
  # (apply 워크플로우는 terraform/** 로 한정되어 있어 문서/워크플로 변경엔 apply 안 됨)
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  TF_VERSION: "1.11.4"
  WORKING_DIR: terraform/environments/prod

jobs:
  # ───────────────────────── fmt / validate / lint ─────────────────────────
  validate:
    name: fmt / validate / lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform init (no backend)
        run: terraform init -backend=false
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform validate
        run: terraform validate -no-color
        working-directory: ${{ env.WORKING_DIR }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint
        run: tflint --recursive
        working-directory: terraform

  # ───────────────────────── Trivy IaC 보안 스캔 ─────────────────────────
  # 게이팅: CRITICAL 만 차단. 결과는 SARIF(Security 탭) + 아티팩트(통합 코멘트용).
  security:
    name: trivy (IaC misconfig)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # SARIF 업로드(Code Scanning)
    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: terraform
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy-config

      - name: Trivy scan (json)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: terraform
          format: json
          output: trivy.json
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"

      # 통합 코멘트(plan 잡)에서 쓰도록 결과를 아티팩트로 전달
      - name: Upload Trivy result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-json
          path: trivy.json
          if-no-files-found: ignore

      # 게이트: CRITICAL 발견 시에만 실패 (아티팩트 업로드 후 마지막에)
      - name: Trivy gate (fail on CRITICAL only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: terraform
          format: table
          severity: CRITICAL
          exit-code: "1"

  # ───────────────────── plan + 비용 + Trivy → 통합 코멘트 ─────────────────────
  # security 결과 아티팩트를 받아 plan/비용/Trivy 를 하나의 PR 코멘트로 게시.
  # always() 로 security 게이트가 실패해도 리포트는 항상 게시. CI plan 은 -lock=false.
  plan:
    name: plan / cost (prod)
    needs: [validate, security]
    runs-on: ubuntu-latest
    if: always() && vars.AWS_ROLE_ARN != ''
    permissions:
      id-token: write # OIDC
      contents: read
      pull-requests: write # PR 코멘트
    env:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }} # 무료 키 등록 시 비용 활성화
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -input=false
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set +e
          terraform plan -no-color -input=false -lock=false -out=tfplan
          code=$?
          terraform show -no-color tfplan > plan.txt  2>/dev/null
          terraform show -json    tfplan > plan.json 2>/dev/null
          echo "exitcode=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Setup Infracost
        if: env.INFRACOST_API_KEY != ''
        uses: infracost/actions/setup@v4
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Cost estimate (Infracost)
        id: cost
        continue-on-error: true
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }} # 증감 기준(main)
        run: |
          if [ -z "${INFRACOST_API_KEY:-}" ]; then
            echo "INFRACOST_API_KEY 시크릿 미설정 — 비용 추정 생략 (무료 키: dashboard.infracost.io)" > cost.txt
            exit 0
          fi
          PLAN_JSON="${WORKING_DIR}/plan.json"
          if [ ! -s "$PLAN_JSON" ]; then
            echo "plan JSON 없음 — 비용 추정 생략" > cost.txt; exit 0
          fi
          infracost breakdown --path "$PLAN_JSON" --format json --out-file infracost.json --no-color || true
          if [ -s infracost.json ]; then
            infracost output --path infracost.json --format table --no-color --out-file cost.txt || true
          else
            echo "Infracost 실행 실패 (Actions 로그 확인)" > cost.txt
          fi

          # ── base(main) 대비 이 PR의 비용 증감 (base plan 1회 추가 생성 → diff) ──
          if [ -n "${BASE_REF:-}" ] && [ -s infracost.json ]; then
            git fetch origin "$BASE_REF" --depth=1 >/dev/null 2>&1 || true
            if git worktree add -f /tmp/base "origin/$BASE_REF" >/dev/null 2>&1; then
              (
                cd "/tmp/base/${WORKING_DIR}" &&
                  terraform init -input=false >/dev/null 2>&1 &&
                  terraform plan -no-color -input=false -lock=false -out=tfplan.base >/dev/null 2>&1 &&
                  terraform show -json tfplan.base > plan.base.json 2>/dev/null
              ) || true
              if [ -s "/tmp/base/${WORKING_DIR}/plan.base.json" ]; then
                infracost breakdown --path "/tmp/base/${WORKING_DIR}/plan.base.json" --format json --out-file infracost-base.json --no-color || true
                infracost diff --path "$PLAN_JSON" --compare-to infracost-base.json --format diff --no-color > cost-diff.txt 2>/dev/null || true
              fi
            fi
          fi

          # USD→KRW 환율 (무료·키 불필요, 실패 시 1380 폴백)
          FX=$(curl -fsSL --max-time 10 "https://api.frankfurter.app/latest?from=USD&to=KRW" 2>/dev/null | jq -r '.rates.KRW // empty' 2>/dev/null)
          [ -n "$FX" ] || FX=1380
          echo "$FX" > fxrate.txt
          cat cost.txt

      - name: Download Trivy result
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: trivy-json
          path: .

      - name: Post combined CI report
        if: always()
        uses: actions/github-script@v7
        env:
          PLAN_EXIT: ${{ steps.plan.outputs.exitcode }}
          WORKDIR: ${{ env.WORKING_DIR }}
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const read = (p) => fs.existsSync(p) ? fs.readFileSync(p, 'utf8') : '';

            // ── Plan ──
            let plan = read(`${process.env.WORKDIR}/plan.txt`).trim() || '(plan 출력 없음)';
            const MAX = 50000;
            let planTrunc = '';
            if (plan.length > MAX) { plan = plan.slice(0, MAX); planTrunc = '\n\n> 출력이 잘렸습니다. Actions 로그 참고.'; }
            const ok = process.env.PLAN_EXIT === '0';
            const planSection = [
              `### Terraform Plan ${ok ? '✅' : '❌'}`,
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```terraform',
              plan,
              '```',
              '</details>' + planTrunc,
            ].join('\n');

            // ── Cost ──
            let costSection;
            try {
              const ic = JSON.parse(read('infracost.json'));
              const fx = parseFloat(read('fxrate.txt')) || 0;
              const fmt = n => '$' + Number(n || 0).toFixed(2);
              const krw = n => fx ? '₩' + Math.round(Number(n || 0) * fx).toLocaleString('en-US') : '-';
              const resources = (((ic.projects || [])[0] || {}).breakdown || {}).resources || [];
              const rows = resources.filter(r => r.monthlyCost != null)
                .sort((a, b) => Number(b.monthlyCost) - Number(a.monthlyCost))
                .map(r => `| \`${r.name}\` | ${fmt(r.monthlyCost)} | ${krw(r.monthlyCost)} |`);
              const total = ic.totalMonthlyCost;
              const fxNote = fx ? ` ($1 ≈ ₩${Math.round(fx).toLocaleString('en-US')})` : '';
              const costDetail = read('cost.txt').trim();

              // ── 이 PR로 인한 증감 (base=main 대비) ──
              let deltaLine = '';
              const diffDetail = read('cost-diff.txt').trim();
              try {
                const base = JSON.parse(read('infracost-base.json'));
                const baseTotal = Number(base.totalMonthlyCost || 0);
                const prTotal = Number(total || 0);
                const d = prTotal - baseTotal;
                if (Math.abs(d) < 0.005) {
                  deltaLine = `**이 PR로 인한 비용 변화: 없음** (합계 ${fmt(prTotal)} 유지)`;
                } else {
                  const sign = d > 0 ? '+' : '−';
                  deltaLine = `**이 PR로 인한 변화: ${sign}${fmt(Math.abs(d))}/월 (약 ${sign}${krw(Math.abs(d))})** · ${fmt(baseTotal)} → ${fmt(prTotal)}`;
                }
              } catch (e) {}

              const lines = ['### 월 예상 비용 (Infracost)', ''];
              if (deltaLine) lines.push(deltaLine, '');
              lines.push(
                `합계 ${fmt(total)} / 월 (약 ${krw(total)})${fxNote} · 사용량 제외`,
                '',
                '| 리소스 | 월 비용 | 원화(약) |',
                '|---|--:|--:|',
                ...rows,
                `| **합계** | **${fmt(total)}** | **${krw(total)}** |`,
                '',
              );
              if (diffDetail) lines.push('<details><summary>이 PR 비용 변화 상세 (diff)</summary>\n\n```\n' + diffDetail + '\n```\n</details>');
              if (costDetail) lines.push('<details><summary>상세 (전체 비용 항목)</summary>\n\n```\n' + costDetail + '\n```\n</details>');
              costSection = lines.join('\n');
            } catch (e) {
              costSection = '### 월 예상 비용 (Infracost)\n\n' + (read('cost.txt').trim() || '비용 추정 생략');
            }

            // ── Trivy ──
            let trivySection;
            try {
              const data = JSON.parse(read('trivy.json'));
              let findings = [];
              for (const r of (data.Results || [])) {
                for (const m of (r.Misconfigurations || [])) {
                  const cm = m.CauseMetadata || {};
                  let title = (m.Title || '').replace(/\s+/g, ' ').replace(/\|/g, '\\|').trim();
                  if (title.length > 90) title = title.slice(0, 90) + '…';
                  findings.push({ sev: m.Severity || '?', id: m.AVDID || m.ID || '', title, url: m.PrimaryURL || '', resource: cm.Resource || '', loc: r.Target + (cm.StartLine ? ':' + cm.StartLine : '') });
                }
              }
              const rank = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };
              findings.sort((a, b) => (rank[a.sev] ?? 9) - (rank[b.sev] ?? 9));
              const n = s => findings.filter(f => f.sev === s).length;
              const head = `### Trivy IaC Scan\n\n**CRITICAL ${n('CRITICAL')} · HIGH ${n('HIGH')} · MEDIUM ${n('MEDIUM')}** — CRITICAL만 차단 · 예외 \`.trivyignore\``;
              if (findings.length === 0) {
                trivySection = head + '\n\n미스컨피그 없음';
              } else {
                const rows = findings.slice(0, 50).map(f =>
                  `| ${f.sev} | ${f.url ? `[${f.id}](${f.url})` : f.id} — ${f.title} | \`${f.resource}\` | \`${f.loc}\` |`);
                trivySection = head + '\n\n| 심각도 | 점검 | 리소스 | 위치 |\n|---|---|---|---|\n' + rows.join('\n');
              }
            } catch (e) {
              trivySection = '### Trivy IaC Scan\n\n(결과 없음 — Security 탭 참고)';
            }

            const body = [
              '<!-- ci-report -->',
              `## CI 리포트 — \`${context.sha.slice(0, 7)}\` · @${context.actor}`,
              '', planSection,
              '', '---', '', costSection,
              '', '---', '', trivySection,
            ].join('\n');

            await core.summary.addRaw(body).write();

            if (context.eventName === 'pull_request') {
              const issue_number = context.issue.number;
              const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
              const found = comments.find(c => c.body && c.body.includes('<!-- ci-report -->'));
              if (found) await github.rest.issues.updateComment({ owner, repo, comment_id: found.id, body });
              else await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0'
        run: |
          echo "::error::terraform plan 이 실패했습니다 (exit ${{ steps.plan.outputs.exitcode }}). PR 코멘트/로그를 확인하세요."
          exit 1
