name: Terraform CI

# PR 검증: fmt/validate/lint · Trivy(IaC 보안) · plan(+비용) 코멘트
on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-ci.yml"

permissions:
  contents: read

env:
  TF_VERSION: "1.11.4"
  WORKING_DIR: terraform/environments/prod

jobs:
  # ───────────────────────── fmt / validate / lint ─────────────────────────
  validate:
    name: fmt / validate / lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform init (no backend)
        run: terraform init -backend=false
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform validate
        run: terraform validate -no-color
        working-directory: ${{ env.WORKING_DIR }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint
        run: tflint --recursive
        working-directory: terraform

  # ───────────────────────── Trivy IaC 보안 스캔 ─────────────────────────
  # 게이팅: CRITICAL 만 차단. HIGH/MEDIUM 은 Security 탭(SARIF) + Job Summary 로 표시만.
  security:
    name: trivy (IaC misconfig)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # SARIF 업로드(Code Scanning)
      pull-requests: write # Trivy 결과 PR 코멘트
    steps:
      - uses: actions/checkout@v4

      # 1) SARIF → Code Scanning (public repo 라 가능) : PR 인라인 + Security 탭
      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: terraform
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy-config

      # 2) JSON 스캔 → 파싱해서 PR 코멘트 + Job Summary 로 보기 좋게 게시
      - name: Trivy scan (json)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: terraform
          format: json
          output: trivy.json
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"

      - name: Report Trivy (PR comment + summary)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;

            let findings = [];
            try {
              const data = JSON.parse(fs.readFileSync('trivy.json', 'utf8'));
              for (const r of (data.Results || [])) {
                for (const m of (r.Misconfigurations || [])) {
                  const cm = m.CauseMetadata || {};
                  let title = (m.Title || '').replace(/\s+/g, ' ').replace(/\|/g, '\\|').trim();
                  if (title.length > 90) title = title.slice(0, 90) + '…';
                  findings.push({
                    sev: m.Severity || 'UNKNOWN',
                    id: m.AVDID || m.ID || '',
                    title,
                    url: m.PrimaryURL || '',
                    resource: cm.Resource || '',
                    loc: r.Target + (cm.StartLine ? ':' + cm.StartLine : ''),
                  });
                }
              }
            } catch (e) { findings = []; }

            const rank = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3, UNKNOWN: 4 };
            findings.sort((a, b) => (rank[a.sev] ?? 9) - (rank[b.sev] ?? 9));
            const n = s => findings.filter(f => f.sev === s).length;

            const head = [
              '<!-- trivy-scan -->',
              '### Trivy IaC Scan',
              '',
              `**CRITICAL ${n('CRITICAL')} · HIGH ${n('HIGH')} · MEDIUM ${n('MEDIUM')}** — 게이팅: CRITICAL만 차단 · 예외 \`.trivyignore\``,
              '',
            ];

            let body;
            if (findings.length === 0) {
              body = [...head, '미스컨피그 없음'].join('\n');
            } else {
              const rows = findings.slice(0, 50).map(f =>
                `| ${f.sev} | ${f.url ? `[${f.id}](${f.url})` : f.id} — ${f.title} | \`${f.resource}\` | \`${f.loc}\` |`
              );
              const more = findings.length > 50 ? `\n\n> 외 ${findings.length - 50}건 (Security 탭 참고)` : '';
              body = [...head, '| 심각도 | 점검 | 리소스 | 위치 |', '|---|---|---|---|', ...rows].join('\n') + more;
            }

            await core.summary.addRaw(body).write();

            if (context.eventName === 'pull_request') {
              const issue_number = context.issue.number;
              const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
              const found = comments.find(c => c.body && c.body.includes('<!-- trivy-scan -->'));
              if (found) await github.rest.issues.updateComment({ owner, repo, comment_id: found.id, body });
              else await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      # 3) 게이트: CRITICAL 발견 시에만 실패 (마지막에 둬서 위 요약/SARIF/코멘트 는 항상 게시)
      - name: Trivy gate (fail on CRITICAL only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: terraform
          format: table
          severity: CRITICAL
          exit-code: "1"

  # ───────────────────────── plan + 비용(OpenInfraQuote) ─────────────────────────
  # plan 과 비용을 한 잡에서 처리(두 잡이면 plan 이 동시에 돌아 S3 상태잠금 충돌).
  # CI plan 은 -lock=false (읽기 전용; 동시 PR 잠금 경합 방지).
  plan:
    name: plan / cost (prod)
    needs: [validate]
    runs-on: ubuntu-latest
    if: vars.AWS_ROLE_ARN != '' # OIDC role 변수 등록 시 활성화
    permissions:
      id-token: write # OIDC
      contents: read
      pull-requests: write # PR 코멘트
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -input=false
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set +e
          terraform plan -no-color -input=false -lock=false -out=tfplan
          code=$?
          terraform show -no-color tfplan > plan.txt  2>/dev/null
          terraform show -json    tfplan > plan.json 2>/dev/null
          echo "exitcode=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Cost estimate (OpenInfraQuote)
        id: cost
        continue-on-error: true
        run: |
          curl -fsSL https://oiq.terrateam.io/prices.csv.gz | gunzip > prices.csv
          PLAN_JSON="${WORKING_DIR}/plan.json"
          if [ ! -s "$PLAN_JSON" ]; then
            echo "plan JSON 없음 — 비용 추정 생략" > cost.txt; exit 0
          fi
          docker run --rm -i -v "$PWD:/w" -w /w ghcr.io/terrateamio/openinfraquote:latest \
            match --pricesheet prices.csv "$PLAN_JSON" > matched.json || true
          docker run --rm -i ghcr.io/terrateamio/openinfraquote:latest \
            price --region ap-northeast-2 < matched.json > cost.txt || true
          [ -s cost.txt ] || echo "비용 추정 결과 없음(리소스 없음)" > cost.txt
          cat cost.txt

      - name: Post plan + cost to PR & summary
        if: always()
        uses: actions/github-script@v7
        env:
          PLAN_EXIT: ${{ steps.plan.outputs.exitcode }}
          WORKDIR: ${{ env.WORKING_DIR }}
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;

            const read = (p) => fs.existsSync(p) ? fs.readFileSync(p, 'utf8') : '';
            let plan = read(`${process.env.WORKDIR}/plan.txt`).trim() || '(plan 출력 없음)';
            const MAX = 60000;
            let truncated = '';
            if (plan.length > MAX) {
              plan = plan.slice(0, MAX);
              truncated = '\n\n> ⚠️ 출력이 잘렸습니다. 전체는 Actions 런 로그를 확인하세요.';
            }
            let cost = read('cost.txt').trim() || '비용 추정 결과 없음';

            const ok = process.env.PLAN_EXIT === '0';
            const icon = ok ? '✅' : '❌';

            const planBody = [
              '<!-- terraform-plan -->',
              `### Terraform Plan ${icon}`,
              '',
              `* **Working directory:** \`${process.env.WORKDIR}\``,
              `* **Commit:** \`${context.sha.slice(0, 7)}\` · **By:** @${context.actor}`,
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```terraform',
              plan,
              '```',
              '</details>' + truncated,
            ].join('\n');

            const costBody = [
              '<!-- infra-cost -->',
              '### 월 예상 비용 (OpenInfraQuote)',
              '',
              '```',
              cost,
              '```',
              '',
              '<sub>region: ap-northeast-2</sub>',
            ].join('\n');

            // Job Summary
            await core.summary.addRaw(planBody + '\n\n' + costBody).write();

            // PR 코멘트 upsert (마커별로 기존 코멘트 갱신)
            if (context.eventName === 'pull_request') {
              const issue_number = context.issue.number;
              const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
              for (const [marker, body] of [['<!-- terraform-plan -->', planBody], ['<!-- infra-cost -->', costBody]]) {
                const found = comments.find(c => c.body && c.body.includes(marker));
                if (found) {
                  await github.rest.issues.updateComment({ owner, repo, comment_id: found.id, body });
                } else {
                  await github.rest.issues.createComment({ owner, repo, issue_number, body });
                }
              }
            }

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0'
        run: |
          echo "::error::terraform plan 이 실패했습니다 (exit ${{ steps.plan.outputs.exitcode }}). PR 코멘트/로그를 확인하세요."
          exit 1
